<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu bản thân - Thu Thảo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            text-align: center;
            padding: 30px 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ff7979;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: white;
            border: 4px solid #ffebeb;
        }
        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .tagline {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-style: italic;
        }
        .info-section {
            text-align: left;
            background: #fafafa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .info-item {
            margin-bottom: 10px;
            font-size: 15px;
            line-height: 1.5;
        }
        .info-item strong {
            color: #34495e;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">🌸</div>
        
        <h1>Thu Thảo</h1>
        <p class="tagline">Welcome to my personal space!</p>
        
        <div class="info-section">
            <div class="info-item"><strong>🎂 Tuổi:</strong> 19 tuổi</div>
            <div class="info-item"><strong>🏡 Quê quán:</strong> Nam Định</div>
            <div class="info-item"><strong>🎓 Sinh viên:</strong> Ngành Quản trị kinh doanh</div>
            <div class="info-item"><strong>🏫 Trường:</strong> Học viện Công nghệ Bưu chính Viễn thông (PTIT)</div>
            <div class="info-item"><strong>🐾 Sở thích:</strong> Cực kỳ yêu chó 🐶 và đam mê ngủ nướng 💤</div>
        </div>

        <a href="index.html" class="back-btn">Quay lại Trang chủ</a>
    </div>

</body>
</html>
